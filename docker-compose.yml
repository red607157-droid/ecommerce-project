services:
  backend:
    build: .
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_NAME: ecommerce_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      MONGO_HOST: mongo
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: